name: MNEE CLI Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main, develop ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install system dependencies for keytar
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
      
      - name: Setup secret service for keytar
        run: |
          mkdir -p ~/.local/share/keyrings
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          echo -n "test" | gnome-keyring-daemon --unlock
          eval $(gnome-keyring-daemon --start --components=secrets)
          echo "GNOME_KEYRING_CONTROL=$GNOME_KEYRING_CONTROL" >> $GITHUB_ENV
          echo "GNOME_KEYRING_PID=$GNOME_KEYRING_PID" >> $GITHUB_ENV
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        id: build
        run: npm run build
      
      - name: Import test wallet to keytar
        run: node scripts/import-ci-wallet.js
        env:
          TEST_WALLET_DATA: ${{ secrets.TEST_WALLET_DATA }}
          DBUS_SESSION_BUS_ADDRESS: ${{ env.DBUS_SESSION_BUS_ADDRESS }}
          GNOME_KEYRING_CONTROL: ${{ env.GNOME_KEYRING_CONTROL }}
      
      - name: Verify wallet setup
        id: verify
        run: node scripts/verify-ci-wallet.js
        env:
          DBUS_SESSION_BUS_ADDRESS: ${{ env.DBUS_SESSION_BUS_ADDRESS }}
          GNOME_KEYRING_CONTROL: ${{ env.GNOME_KEYRING_CONTROL }}
      
      - name: Run tests
        run: npm run test:no-build
        env:
          CI: true
          NODE_ENV: test
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
          DBUS_SESSION_BUS_ADDRESS: ${{ env.DBUS_SESSION_BUS_ADDRESS }}
          GNOME_KEYRING_CONTROL: ${{ env.GNOME_KEYRING_CONTROL }}
      
      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: CI (GitHub Actions)" >> $GITHUB_STEP_SUMMARY
          echo "Node Version: 20.x" >> $GITHUB_STEP_SUMMARY
          echo "Wallet: Single test wallet imported" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All tests passed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Post success comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ✅ Build & Test Pipeline Passed
            
            All quality checks have passed successfully.
            
            | Check | Status |
            |-------|--------|
            | Build | ✅ Passed |
            | Wallet Setup | ✅ Verified |
            | QA Tests | ✅ Passed |
            
            Ready for review! 🚀`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      
      - name: Post failure comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ Build & Test Pipeline Failed
            
            | Check | Status |
            |-------|--------|
            | Build | ${{ steps.build.outcome == 'success' && '✅' || '❌'  }} |
            | Wallet Setup | ${{ steps.verify.outcome == 'success' && '✅' || '❌' }} |
            | QA Tests | ❌ Failed |
            
            Please check the [Actions tab](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      
      - name: Cleanup keyring on failure
        if: failure()
        run: |
          echo "Cleaning up keyring..."
          pkill -9 gnome-keyring-daemon || true